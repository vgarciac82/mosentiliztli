# Nginx reverse proxy for Redmine MCP Server with X-API-Key validation.
# All requests to /mcp and /files/ require valid X-API-Key (auth_request to mcp-auth).

upstream mcp_backend {
    server redmine-mcp-server:8000;
}

upstream mcp_auth {
    server mcp-auth:9090;
}

server {
    listen 8080;
    server_name _;

    # Health: no auth (for orchestrator healthchecks)
    location /health {
        proxy_pass http://mcp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Internal auth check: Nginx sends subrequest with original headers; validator checks X-API-Key
    location = /_validate {
        internal;
        proxy_pass http://mcp_auth/;
        proxy_pass_request_headers on;
        proxy_set_header Host $host;
    }

    # MCP endpoint: require valid X-API-Key, then proxy to backend
    location /mcp {
        auth_request /_validate;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @unauthorized;

        proxy_pass http://mcp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Attachment downloads: require valid X-API-Key
    location /files/ {
        auth_request /_validate;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @unauthorized;

        proxy_pass http://mcp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cleanup status: require valid X-API-Key
    location /cleanup/ {
        auth_request /_validate;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @unauthorized;

        proxy_pass http://mcp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @unauthorized {
        default_type application/json;
        return 401 '{"error":"Unauthorized","message":"Valid X-API-Key header required"}';
    }
}
