# ─────────────────────────────────────────────────────────────────────────────
# nginx — Docker Registry Reverse Proxy
#
# Responsibilities:
#   • TLS termination (TLS 1.2/1.3 only)
#   • Security headers (HSTS, CSP, X-Frame-Options, ...)
#   • Rate limiting (push & pull separately)
#   • HTTP → HTTPS redirect
#   • Block access to internal metrics endpoint (/metrics)
#
# NOTE: setup.sh replaces 'registry.example.com' with REGISTRY_DOMAIN from .env
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate Limiting Zones ────────────────────────────────────────────────────────
# Push operations are constrained tightly to prevent abuse / data exfiltration
limit_req_zone  $binary_remote_addr  zone=registry_push:10m  rate=20r/m;
# Pulls are more permissive to allow parallel layer downloads
limit_req_zone  $binary_remote_addr  zone=registry_pull:10m  rate=120r/m;
# Concurrent connection limit per IP
limit_conn_zone $binary_remote_addr  zone=registry_conn:10m;

# ── Upstream ───────────────────────────────────────────────────────────────────
upstream docker_registry {
    server registry:5000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen      80  default_server;
    listen [::]:80  default_server;
    server_name _;

    # Let's Encrypt ACME challenge (uncomment when using certbot HTTP-01)
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    return 301 https://$host$request_uri;
}

# ── HTTPS ──────────────────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen [::]:443 ssl;
    http2 on;

    # Change to your registry FQDN (setup.sh does this automatically)
    server_name 10.0.1.61;

    # ── TLS ─────────────────────────────────────────────────────────────────
    ssl_certificate      /etc/nginx/certs/registry.crt;
    ssl_certificate_key  /etc/nginx/certs/registry.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — enable only with a CA-signed (e.g. Let's Encrypt) certificate
    # ssl_stapling        on;
    # ssl_stapling_verify on;
    # resolver            1.1.1.1 8.8.8.8 valid=300s;
    # resolver_timeout    5s;

    # ── Security Headers ─────────────────────────────────────────────────────
    # HSTS: force HTTPS for 2 years, include subdomains
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Prevent clickjacking
    add_header X-Frame-Options           "DENY"                                          always;
    # Prevent MIME sniffing
    add_header X-Content-Type-Options    "nosniff"                                       always;
    # Lock down Referrer leakage
    add_header Referrer-Policy           "no-referrer"                                   always;
    # Minimal CSP — registry API only serves JSON/binary, no HTML
    add_header Content-Security-Policy   "default-src 'none'"                           always;

    # ── Upload & Timeout Settings ─────────────────────────────────────────────
    # Large images (multi-GB) can take several minutes to push
    client_max_body_size  2G;
    proxy_read_timeout    900s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    900s;

    # Disable nginx buffering for streaming (layer downloads / chunked uploads)
    proxy_buffering         off;
    proxy_request_buffering off;

    # Max 20 simultaneous connections per client IP
    limit_conn registry_conn 20;

    # ── Docker Registry API proxy ─────────────────────────────────────────────
    location /v2/ {
        # Push operations — strict limit with small burst
        limit_req zone=registry_push burst=10 nodelay;

        proxy_pass                          http://docker_registry;
        proxy_set_header  Host              $http_host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;

        # Required: Docker client checks this header to confirm the registry version
        add_header Docker-Distribution-Api-Version "registry/2.0" always;
    }

    # ── Blob layer downloads (GET /v2/.../blobs/sha256:...) ───────────────────
    # Higher rate limit; parallel pulls are normal for Docker clients
    location ~ "^/v2/[^/]+(?:/[^/]+)*/blobs/sha256:" {
        limit_req zone=registry_pull burst=60 nodelay;

        proxy_pass                          http://docker_registry;
        proxy_set_header  Host              $http_host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;

        add_header Docker-Distribution-Api-Version "registry/2.0" always;
    }

    # ── Block internal endpoints from external access ─────────────────────────
    # Registry debug server metrics are on port 5001 (internal only).
    # Deny any stray request that might reach /metrics or /debug.
    location ~ ^/(metrics|debug) {
        deny all;
        return 403;
    }

    # ── Deny all other paths ──────────────────────────────────────────────────
    location / {
        return 404;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/registry-access.log combined;
    error_log  /var/log/nginx/registry-error.log warn;
}
