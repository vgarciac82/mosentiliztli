# ─────────────────────────────────────────────────────────────────────────────
# Docker Private Registry — Production Docker Compose
#
# Quick start (no manual setup required for dev/test):
#   docker compose up -d
#
# For production (Let's Encrypt cert + bcrypt passwords):
#   bash scripts/setup.sh   ← run once before first launch
#   docker compose up -d
#
# On-demand vulnerability scan:
#   docker compose --profile tools run --rm trivy image registry.example.com/myapp:1.0
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── certgen: one-time self-signed TLS certificate generation ─────────────────
  # Idempotent: skips generation if certs/registry.crt already exists.
  # For production replace the cert files with Let's Encrypt ones and
  # this service will be a no-op from the second run onwards.
  certgen:
    image: alpine:3.21
    container_name: registry-certgen
    environment:
      REGISTRY_DOMAIN: ${REGISTRY_DOMAIN:-registry.example.com}
    volumes:
      - ./certs:/certs
    # List form + | literal block: newlines preserved exactly, no double-shell wrapping.
    # $$ is escaped so Docker Compose does not interpolate it at parse time;
    # the container shell receives it as $REGISTRY_DOMAIN at runtime.
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        if [ -f /certs/registry.crt ] && [ -f /certs/registry.key ]; then
          echo '[certgen] Certificates already exist - skipping.'
          exit 0
        fi
        apk add --no-cache openssl -q
        echo "[certgen] Generating self-signed certificate for: $$REGISTRY_DOMAIN"
        if echo "$$REGISTRY_DOMAIN" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$$'; then
          SAN="IP:$$REGISTRY_DOMAIN,DNS:localhost,IP:127.0.0.1"
        else
          SAN="DNS:$$REGISTRY_DOMAIN,DNS:localhost,IP:127.0.0.1"
        fi
        openssl req -newkey rsa:4096 -nodes \
          -keyout /certs/registry.key \
          -x509 -days 365 \
          -out /certs/registry.crt \
          -subj "/C=ES/ST=State/L=City/O=Private Registry/CN=$$REGISTRY_DOMAIN" \
          -addext "subjectAltName=$$SAN" \
          2>/dev/null
        chmod 600 /certs/registry.key
        chmod 644 /certs/registry.crt
        echo '[certgen] Certificate ready.'
    restart: "no"

  # ── nginx: TLS termination, rate limiting, security headers ────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: registry-nginx
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:81:80"
      - "${BIND_ADDRESS:-0.0.0.0}:443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - frontend
    depends_on:
      registry:
        condition: service_healthy
      certgen:
        condition: service_completed_successfully
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── registry: Docker Registry v2 ───────────────────────────────────────────
  registry:
    image: registry:2.8
    container_name: registry-core
    environment:
      # Log settings
      REGISTRY_LOG_LEVEL: ${LOG_LEVEL:-info}
      REGISTRY_LOG_FORMAT: json
      # Storage credentials (injected from .env, not stored in config.yml)
      REGISTRY_STORAGE_S3_ACCESSKEY: ${MINIO_ROOT_USER}
      REGISTRY_STORAGE_S3_SECRETKEY: ${MINIO_ROOT_PASSWORD}
      REGISTRY_STORAGE_S3_BUCKET: ${MINIO_BUCKET:-docker-registry}
      # HTTP signing secret — must be unique per deployment
      REGISTRY_HTTP_SECRET: ${REGISTRY_HTTP_SECRET}
    volumes:
      - ./config/registry/config.yml:/etc/docker/registry/config.yml:ro
      # auth volume: NOT :ro — registry:2.8 htpasswd opens the file with O_RDWR
      # even though it only reads from it (bug in docker/distribution).
      # Security is preserved: file has mode 600 on the host (set by setup.sh)
      # and the container process runs as a non-root uid with no-new-privileges.
      - ./auth:/auth
      - ./certs:/certs:ro
    networks:
      - frontend   # reachable by nginx
      - backend    # reaches MinIO storage
    expose:
      - "5000"  # registry API
      - "5001"  # debug/metrics (internal only, blocked by nginx)
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # NOTE: read_only: true is intentionally omitted for the registry service.
    # The registry:2.8 image does not pre-create /auth or /certs directories;
    # Docker cannot create bind-mount targets on a read-only overlay (EROFS).
    # Equivalent protections are applied instead:
    #   - all mounted config/auth/cert files use the :ro bind mount flag
    #   - no-new-privileges prevents privilege escalation
    #   - the registry process runs as the non-root uid from the base image
    tmpfs:
      - /tmp:size=512m,mode=1777
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      # Check HTTP response code: 200 (no auth) or 401 (auth required) = registry alive.
      # BusyBox wget (used in registry:2.8) exits 1 on 4xx — cannot rely on exit code.
      # Instead, capture response headers with --server-response and grep the status line.
      test: ["CMD-SHELL", "wget -qO /dev/null --server-response http://localhost:5000/v2/ 2>&1 | grep -qE 'HTTP/[0-9.]+ (200|401)'"]
      interval: 20s
      timeout: 10s
      start_period: 30s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── minio: S3-compatible persistent object storage ─────────────────────────
  minio:
    image: minio/minio:latest
    container_name: registry-storage
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Disable MinIO telemetry
      MINIO_UPDATE: "off"
    volumes:
      - minio_data:/data
    networks:
      - backend
    expose:
      - "9000"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── minio-init: one-time bucket provisioning ────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: registry-minio-init
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-docker-registry}
    entrypoint: >
      /bin/sh -c "
        echo '[init] Configuring MinIO alias...' &&
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        echo '[init] Creating bucket if not exists...' &&
        mc mb --ignore-existing local/$$MINIO_BUCKET &&
        mc anonymous set private local/$$MINIO_BUCKET &&
        echo '[init] MinIO bucket ready: '$$MINIO_BUCKET
      "
    networks:
      - backend
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  # ── prometheus: metrics collection (internal only) ──────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: registry-prometheus
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - frontend
      - backend
    expose:
      - "9090"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: "65534:65534"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.enable-lifecycle"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── trivy: vulnerability scanner (run on-demand, not started by default) ───
  # Usage: docker compose --profile tools run --rm trivy image <registry>/<image>:<tag>
  trivy:
    image: aquasec/trivy:latest
    container_name: registry-trivy
    volumes:
      - trivy_cache:/root/.cache/trivy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend
    profiles:
      - tools
    entrypoint: ["trivy"]
    security_opt:
      - no-new-privileges:true

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  minio_data:
    driver: local
  trivy_cache:
    driver: local
  prometheus_data:
    driver: local
  nginx_logs:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
    # nginx, registry, prometheus — internet-facing (nginx handles TLS)
  backend:
    driver: bridge
    internal: true
    # registry ↔ minio ↔ minio-init — no external internet access
