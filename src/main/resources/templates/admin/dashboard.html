<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrativo - Boda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
    </style>
</head>
<body class="text-slate-800 antialiased">
    
    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold text-slate-800 tracking-tight">Panel de Recepción</h1>
        <div class="text-sm text-slate-500">Jenny & Vicente</div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">
        
        <!-- Tarjetas de Métricas -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div class="bg-white rounded-xl p-6 card-shadow border border-slate-100 flex flex-col justify-between">
                <p class="text-sm font-medium text-slate-500 uppercase tracking-wider mb-2">Total Grupos</p>
                <div class="flex items-baseline space-x-2">
                    <span class="text-4xl font-bold text-slate-800" th:text="${totalInvitados}">0</span>
                </div>
                <div class="mt-4 flex space-x-2 text-xs">
                    <span class="bg-green-100 text-green-800 px-2 py-1 rounded font-medium" th:text="${totalFamiliasConfirmadas} + ' Conf'"></span>
                    <span class="bg-red-100 text-red-800 px-2 py-1 rounded font-medium" th:text="${totalFamiliasDeclinadas} + ' Decl'"></span>
                    <span class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded font-medium" th:text="${totalFamiliasPendientes} + ' Pend'"></span>
                </div>
            </div>

            <div class="bg-white rounded-xl p-6 card-shadow border border-slate-100 flex flex-col justify-between">
                <p class="text-sm font-medium text-slate-500 uppercase tracking-wider mb-2">Pases Confirmados</p>
                <div class="flex items-baseline space-x-2">
                    <span class="text-4xl font-bold text-emerald-600" th:text="${totalPasesConfirmados}">0</span>
                    <span class="text-sm text-slate-400 font-medium">/ <span th:text="${totalPasesAsignados}">0</span> Asignados</span>
                </div>
                <div class="mt-4 w-full bg-slate-100 rounded-full h-2.5">
                    <div class="bg-emerald-500 h-2.5 rounded-full" th:style="'width: ' + (${totalPasesAsignados > 0 ? (totalPasesConfirmados * 100.0 / totalPasesAsignados) : 0}) + '%'"></div>
                </div>
            </div>
            
        </div>

        <!-- Tabla de Invitados -->
        <div class="bg-white rounded-xl card-shadow border border-slate-100 overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-lg font-semibold text-slate-800">Lista de Invitados</h3>
                <button onclick="enviarInvitaciones()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm">
                    Enviar WhatsApp a Pendientes
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Código</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Nombre</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Celular</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Estatus</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Pases</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Notas</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-slate-100">
                        <tr th:each="guest : ${invitados}" class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-mono text-slate-500" th:text="${guest.codigoInvitacion}"></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="text-sm font-medium text-slate-800" th:text="${guest.nombre}"></div>
                                <div class="text-xs text-slate-400" th:text="${guest.familia}"></div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-mono text-slate-500" th:text="${guest.celular}"></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span th:if="${guest.estatus.name() == 'PENDIENTE'}" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-yellow-100 text-yellow-800">Pendiente</span>
                                <span th:if="${guest.estatus.name() == 'CONFIRMADO'}" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">Confirmado</span>
                                <span th:if="${guest.estatus.name() == 'DECLINADO'}" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">Declinado</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">
                                <span class="font-semibold text-slate-800" th:text="${guest.pasesConfirmados}">0</span> 
                                / <span th:text="${guest.pasesAsignados}">0</span>
                            </td>
                            <td class="px-6 py-4 text-sm text-slate-500 max-w-xs truncate" th:text="${guest.notas}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
    </main>

    <script>
        function enviarInvitaciones() {
            if(!confirm('¿Estás seguro de enviar la invitación por WhatsApp a todos los invitados pendientes?')) return;
            
            fetch('/api/v1/admin/guests/send-invitations', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                alert(`Proceso finalizado. Enviados: ${data.enviados}, Fallidos: ${data.fallidos}`);
                location.reload();
            })
            .catch(err => alert('Ocurrió un error al enviar. Revisa la consola o logs del servidor.'));
        }
    </script>
</body>
</html>
